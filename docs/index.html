<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诛仙后传·红鸾笑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    background: #f5f0eb;
    color: #3d2b1f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 3rem 2rem;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 2px 24px rgba(61, 43, 31, 0.08);
  }
  h1 {
    font-size: 1.8rem;
    font-weight: 600;
    margin-bottom: 0.4rem;
    color: #7f4e1e;
  }
  .sub {
    font-size: 0.95rem;
    color: #8b7355;
    margin-bottom: 2rem;
  }
  .episodes {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  a.ep-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    background: #fdf8f2;
    text-decoration: none;
    color: #3d2b1f;
    transition: background 0.2s;
    border: 1px solid #ede0d4;
  }
  a.ep-link:hover {
    background: #f7ede0;
  }
  .ep-num {
    font-weight: 700;
    font-size: 0.85rem;
    color: #c55a11;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ep-title {
    font-weight: 500;
  }
  .ep-badge {
    font-size: 0.75rem;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
    background: #e8d5c4;
    color: #7f4e1e;
  }
  .coming {
    opacity: 0.5;
    pointer-events: none;
  }
  .coming .ep-badge {
    background: #eee;
    color: #999;
  }
  footer {
    margin-top: 2rem;
    font-size: 0.8rem;
    color: #b8a590;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>诛仙后传·红鸾笑</h1>
    <p class="sub">AIGC 短剧 · 制作脚本</p>
    <div class="episodes">
      <a class="ep-link" href="ep1/">
        <span class="ep-num">第1集</span>
        <span class="ep-title">草庙村</span>
        <span class="ep-badge">✅ 制作中</span>
      </a>
      <a class="ep-link coming">
        <span class="ep-num">第2集</span>
        <span class="ep-title">归山</span>
        <span class="ep-badge">⏳ 待制作</span>
      </a>
      <a class="ep-link coming">
        <span class="ep-num">第3集</span>
        <span class="ep-title">红鸾</span>
        <span class="ep-badge">⏳ 待制作</span>
      </a>
    </div>
  </div>
  <footer>改编自萧鼎《诛仙》番外 · 红鸾笑</footer>
</body>
</html>
